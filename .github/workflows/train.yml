name: Continuous Training

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install scikit-learn xgboost

      - name: Run training
        run: |
          python modules/ml/train_multi_model.py

      - name: Commit model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add models/
          git commit -m "auto: retrain model [skip ci]" || echo "No changes"
          git push
