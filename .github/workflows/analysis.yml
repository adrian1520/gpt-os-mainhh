name: RUN ANALYSIS
on:
  repository_dispatch:
    types: [run_analysis]
jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load task
        run: |
          test -f tasks/task.json || exit 1
      - name: Execute task
        run: |
          TYPE=$(jq -r '.type' tasks/task.json)

          # INGEST
          if [ "$TYPE" = "legal_ingest" ]; then
            CONTENT=$(jq -r '.content' tasks/task.json)
            RAW=$(echo "$CONTENT" | grep -oE 'NSM ? [0-9]+/[0-9]+' | head -n1)
            NSM =$(echo "$RAW" | grep -oE '[0-9]+/[0-9]+')
            NSM_CLEAN=$(echo "$NSM" | sed 's/\//-/')
            DIR="Legal-os/Akta-Spraw/Akta-NSM-$NSM_CLEAN"
            mkdir -p "$DIR"
            echo "$CONTENT" > "$DIR/doc_$(date +%s).txt"
          fi

          # METADATA
          if [ "$TYPE" = "legal_metadata" ]; then
            CONTENT=$(jq -r '.content' tasks/task.json)
            DATE=$(echo "$CONTENT" | grep -oE '[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{4}' | head -n1)
            NEW="{ \"events\": [ { \"date\": \"$DATE\" } ] }"
            echo "$NEW" > temp.json
        fi

          # SNAPSHOT
          if [ "$TYPE" = "legal_snapshot" ]; then
            CONTENT=$(jq -r '.content' tasks/task.json)
            DATE=$(echo "$CONTENT" | grep -oE '[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{4}' | head -n1)
            SUMMARY=$(echo "$CONTENT" | head -n2)
            echo "$DATE - $SUMMARY" > snap.txt
          fi

      - name: Cleanup
        run: rm -f tasks/task.json
      - name: Commit
        run: git add . && git commit -m "update" && git push
