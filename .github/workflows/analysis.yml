name: RUN ANALYSIS
on:
  repository_dispatch:
    types: [run_analysis]
jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load task
        run: |
          test -f tasks/task.json || exit 1
      - name: Execute task
        run: |
          TYPE=$(jq -r '.type' tasks/task.json)

          if [ "$TYPE" = "legal_metadata" ]; then
            CONTENT=$(jq -r '.content' tasks/task.json)
            DATE=$(echo "$CONTENT" | grep -oE '[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{4}' | head -n1)
            EVENT_ID=$(echo "$DATE-$CONTENT" | sha1sum | cut -c1-12)

            echo "EVENT $EVENT_ID" > event.txt
          fi

          if [ "$TYPE" = "legal_snapshot" ]; then
            CONTENT=$(jq -r '.content' tasks/task.json)
            DATE=$(echo "$CONTENT" | grep -oE '[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{4}' | head -n1)
            SNAP_ID=$(echo "$DATE-$CONTENT" | sha1sum | cut -c1-12)
            echo "SNAP $SNAP_ID" > snap.txt
          fi
