name: RUN ANALYSIS
on:
  repository_dispatch:
    types: [run_analysis]
jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load task
        run: |
          test -f tasks/task.json || exit 1

      - name: Execute task
        run: |
          TYPE=$(jq -r '.type' tasks/task.json)
          CONTENT=$(jq -r '.content // ""' tasks/task.json)

          RAW=$(echo "$CONTENT" | grep -oE 'NSM ?[0-9]+/[0-9]+' | head -n1)
          NSM_CLEAN=$(echo "$RAW" | grep -oE '[0-9]+/[0-9]+' | sed 's/\//-/')
          DIR="Legal-os/Akta-Spraw/Akta-NSM-$NSM_CLEAN."
          mkdir -p "$DIR"

          DATE=$(echo "$CONTENT" | grep -oE '[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{4}' | head -n1)
          EVENT_ID=$(echo "$DATE--CONTENT" | sha1sum | cut -c1-12)

          if [ "$TYPE" = "legal_ingest" ]; then
            echo "$CONTENT" > "$DIR/doc_$(date +%s).txt"
          fi

          if [ "$TYPE" = "legal_metadata" ]; then
            NEW="$DIR/new_events.json"
            echo '{ "events": [' > "$NEW"
            echo "  {\"id\":\"$EVENT_ID\",\"date\":\"$DATE\",\"description\":\"$CONTENT\"}" >> "$NEW"
            echo ']}' >> "$NEW"
            OUT="$DIR/timeline.json"
            if [ -f "$OUT" ]; then
              jq -s '{ events: (.[0].events + .[1].events) }' "$OUT" "$NEW" > "$OUT.tmp"
              mv "$OUT.tmp" "$OUT"
            else
              mv "$NEW" "$OUT"
            fi
          fi

          if [ "$TYPE" = "legal_snapshot" ]; then
            NEW="$DIR/new_snap.json"
            echo '{ "snapshots": [ ' > "$NEW"
            echo "  {\"id\":\"$EVENT_ID\",\"date\":\"$DATE\",\"summary\":\"$CONTENT\",\"event_id\":\"$EVENT_ID\"}" >> "$NEW"
            echo ']}' >> "$NEW"

            OUT="$DIR/snapshots.json"
            if [ -f "$OUT" ]; then
              jq -s '{ snapshots: (.[0].snapshots + .[1].snapshots) }' "$OUT" "$NEW" > "$OUT.tmp"
              mv "$OUT.tmp" "$OUT"
            else
              mv "$NEW" "$OUT"
            fi
          fi

      - name: Cleanup
        run: rm -f tasks/task.json
