name: SYSTEM CONTEXT BUILDER
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'
      - 'events/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run Context Builder
        run: |
          python modules/system/context_builder.py
          git config user.name 'gpt-os-system'
          git config user.email 'system@os.local'
          git add memory/system_context.json
          git commit -m "System: Updated system context [skip ci]" || true
          git pull --rebase origin main
          git push
