name: AGENT LEGAL ADVISOR
'on':
  repository_dispatch:
    types:
    - trigger_legal_advisor
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x
    - name: Run agent
      run: python modules/agents/legal_advisor.py
    - name: Safe Push
      run: "git config user.name \"gpt-os-agent\"\ngit config user.email \"agent@os.local\"\
        \ngit add events/\ngit commit -m \"Event: legal_advisor completed\" || echo\
        \ \"No changes\"\n\nfor i in {1..5}; do\n  git pull --rebase origin main\n\
        \  if git push; then exit 0; fi\n  sleep 2\ndone\nexit 1"
