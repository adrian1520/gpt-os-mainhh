name: WRITE AGENT
on:
  push:
    paths:
      - 'events/write_request.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Event and Execute Write
        run: |
          TARGET=$(jq -r '.target_path' events/write_request.json)
          mkdir -p "$(dirname "$TARGET")"
          jq -r '.content' events/write_request.json > "$TARGET"
          git config user.name 'gpt-os-writer'
          git config user.email 'writer@os.local'
          git add "$TARGET"
          git commit -m "Agent Write [skip ci]" || true
          git pull --rebase origin main
          git push
