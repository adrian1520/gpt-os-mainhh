name: legal_pipeline

on:
  push:
    paths:
      - 'Legal-os/input/**'
      - 'events/**'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run deterministic legal pipeline
        run: |
          export PYTHONPATH=.
          python -c "from modules.pipeline.legal_pipeline_v2 import run_pipeline; print(run_pipeline(open('Legal-os/input/postanowienie_nadzor_III_Nsm_756_25.txt').read()))"
