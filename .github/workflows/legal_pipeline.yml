name: legal_pipeline

on:
  push:
    paths:
      - 'Legal-os/input/**'
      - 'events/**'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run batch legal pipeline
        run: |
          export PYTHONPATH=.
          for FILE in Legal-os/input/*; do
            echo "Processing $FILE"
            python -c "from modules.pipeline.legal_pipeline_v2 import run_pipeline; print(run_pipeline(open('$FILE').read()))"
          done
