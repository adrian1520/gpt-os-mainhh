
      - name: Update Case Memory (FIXED PATHS)
        run: |
          python - <<EOF
          from modules.system.case_memory_write import write_facts, write_risk, write_strategy
          import json, os

          def safe_load(path):
              return json.load(open(path)) if os.path.exists(path) else None

          facts = safe_load("Legal-os/Outputs/facts.json")
          if facts:
              write_facts(facts)

          risk = safe_load("Legal-os/Outputs/risk.json")
          if risk:
              write_risk(risk.get("level"), risk.get("reason"))

          strategy = safe_load("Legal-os/Outputs/strategy.json")
          if strategy:
              write_strategy(strategy.get("plan",""))
          EOF

      - name: Write Session Log
        run: |
          python modules/system/write_session_log.py
