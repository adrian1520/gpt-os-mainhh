name: legal_pipeline

on:
  push:
    paths:
      - 'Legal-os/input/**'
      - 'events/**'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run batch legal pipeline with outputs
        run: |
          export PYTHONPATH=.
          mkdir -p Legal-os/Outputs
          for FILE in Legal-os/input/*; do
            NAME=$(basename "$FILE")
            echo "Processing $NAME"
            python -c "from modules.pipeline.legal_pipeline_v2 import run_pipeline; result = run_pipeline(open('$FILE').read()); open(f'Legal-os/Outputs/{NAME}.out','w').write(str(result))"
          done

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Legal-os/Outputs/*
          git commit -m "auto: add pipeline outputs [skip ci]" || echo "No changes"
          git push
