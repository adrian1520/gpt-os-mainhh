name: Legal Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  process-legal-case:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Register case
        run: python modules/system/register_case.py

      - name: Run parser V4
        run: echo "test input document" | python modules/agents/agent_parser_v4.py

      - name: Reasoning layer
        run: python modules/agents/agent_reasoning.py

      - name: Risk analysis
        run: python modules/agents/agent_risk_v2.py

      - name: Strategy
        run: python modules/agents/agent_strategy_v2.py

      - name: Legal action
        run: python modules/agents/agent_legal_action.py

      - name: Aggregate outputs
        run: python modules/agents/agent_aggregator.py
