name: Legal Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  process-legal-case:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Register case
        run: python modules/system/register_case.py

      - name: Run parser V4
        run: |
          export PYTHONPATH=.
          echo "test input document" > input.txt
          python -m modules.agents.agent_parser_v4 < input.txt

      - name: Reasoning layer
        run: |
          export PYTHONPATH=.
          python -m modules.agents.agent_reasoning

      - name: Risk analysis
        run: |
          export PYTHONPATH=.
          python -m modules.agents.agent_risk_v2

      - name: Strategy
        run: |
          export PYTHONPATH=.
          python -m modules.agents.agent_strategy_v2

      - name: Legal action
        run: |
          export PYTHONPATH=.
          python -m modules.agents.agent_legal_action

      - name: Aggregate outputs
        run: |
          export PYTHONPATH=.
          python -m modules.agents.agent_aggregator
