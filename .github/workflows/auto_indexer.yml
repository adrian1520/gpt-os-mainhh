name: AUTO REPO INDEXER
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'
      - 'events/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run Indexer
        run: |
          python modules/system/repo_indexer.py
          git config user.name 'gpt-os-system'
          git config user.email 'system@os.local'
          git add memory/repo_index.json
          git commit -m "System: Auto-updated repo index [skip ci]" || true
          for i in {1..10}; do
            git pull --rebase origin main
            if git push; then
              echo "Push success"
              exit 0
            fi
            DELAY=$((RANDOM % 5 + 3))
            echo "Retry in $DELAY s..."
            sleep $DELAY
          done
          exit 1
