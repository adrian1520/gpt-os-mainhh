name: AUTO CONTEXT BUILDER

on:
  push:
    paths:
      - 'events/**'

jobs:
  rebuild-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Context Builder
        run: |
          mkdir -p events
          python modules/system/context_builder.py

      - name: Safe Push Mechanism
        run: |
          git config user.name "gpt-os-memory"
          git config user.email "memory@os.local"
          git add memory/context_loader.json
          git commit -m "Auto-update context" || echo "No changes"
          
          for i in {1..5}; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            sleep $((RANDOM % 3 + 2))
          done
          exit 1
