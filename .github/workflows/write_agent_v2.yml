name: WRITE AGENT V2

on:
  push:
    branches:
      - main
    paths:
      - events/write_request.json
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Event and Execute Write
        run: |
          TARGET_PATH=$(jq -r ".target_path" events/write_request.json)
          CONTENT=$(jq -r ".content" events/write_request.json)

          mkdir -p "$(dirname "$TARGET_PATH")"

          echo "$CONTENT" > "$TARGET_PATH"

          git config user.name "gpt-os-writer"
          git config user.email "writer@os.local"
          git add "$TARGET_PATH"
          git commit -m "Agent Write: Updated $TARGET_PATH" || echo "No changes"

          for i in {1..5}; do
            git pull --rebase origin main
            if git push; then exit 0; fi
            sleep $((RANDOM % 3 + 2))
          done

          exit 1